<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin - Bookings</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/auth.js"></script>
  <script>
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user") || "null");
    if (!token || !user || user.role !== "admin") {
      window.location.href = "login.html";
    }
  </script>
  <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
</head>
<body class="admin">
<div class="admin-layout">
  <div class="admin-sidebar-container">
    <aside class="admin-sidebar">
      <h2>Admin</h2>
      <a href="admin.html">Dashboard</a>
      <a href="admin-products.html">Products</a>
      <a href="admin-orders.html">Orders</a>
      <a href="admin-bookings.html" class="is-active">Bookings</a>
      <a href="index.html" class="btn admin-back">← Back to site</a>
    </aside>
  </div>

  <main class="admin-main">
    <h1>Bookings</h1>
    <p class="small muted">This page shows all reservation bookings from the API.</p>

    <div class="card p" style="margin-top:20px;">
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Service</th>
            <th>Date</th>
            <th>Time</th>
            <th>Location</th>
            <th>Note</th>
            <th>Duration</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody id="bookingsTbody">
          <tr><td colspan="12" class="small muted">Loading bookings...</td></tr>
        </tbody>
      </table>
      <div id="bookingsMsg" class="small muted" style="margin-top:10px;"></div>
    </div>
  </main>
</div>

<script>
  (function () {
    const API_BASE = "http://localhost:8000";
    const tbody = document.getElementById("bookingsTbody");
    const msgEl = document.getElementById("bookingsMsg");
    if (!tbody) return;

    function esc(v) {
      return String(v ?? "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[m]));
    }

    function formatDate(iso) {
      if (!iso) return "—";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return String(iso);
      return d.toLocaleDateString("hu-HU");
    }

    function formatTime(v) {
      if (!v) return "—";
      return String(v).slice(0, 5);
    }

    async function loadBookings() {
      try {
        const res = await fetch(`${API_BASE}/admin/reservations`, {
          headers: window.Auth.getAuthHeaders(),
        });
        const payload = await res.json();
        if (!res.ok || payload?.success === false) {
          throw new Error(payload?.message || "Failed to load bookings");
        }

        const items = Array.isArray(payload?.reservations) ? payload.reservations : [];
        if (!items.length) {
          tbody.innerHTML = `<tr><td colspan="11" class="small muted">No bookings found.</td></tr>`;
          msgEl.textContent = "";
          return;
        }

        tbody.innerHTML = items.map((b) => {
          return `
            <tr>
              <td>#${esc(b['Foglalás Azonosító'])}</td>
              <td>${esc(b['Név'] || "—")}</td>
              <td>${esc(b['Telefon'] || "—")}</td>
              <td>${esc(b['Email'] || "—")}</td>
              <td>${esc(b['Szolgáltatás'] || "—")}</td>
              <td>${esc(formatDate(b['Dátum']))}</td>
              <td>${esc(formatTime(b['Időpont']))}</td>
              <td>${esc(b['Helyszín'] || "—")}</td>
              <td>${esc(b['Megjegyzés'] || "—")}</td>
              <td>${esc(b['Admin által szabott időtartam'] || "—")}</td>
              <td>${esc(formatDate(b['Rögzítve']))}</td>
            </tr>
          `;
        }).join("");
        msgEl.textContent = "";
      } catch (err) {
        console.error(err);
        tbody.innerHTML = `<tr><td colspan="11" class="small muted">Failed to load bookings.</td></tr>`;
        msgEl.textContent = err?.message || "Request failed";
      }
    }

    loadBookings();
  })();
</script>
<script src="js/app.js"></script>
</body>
</html>
