<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TORMA Security Technology – Products</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Ionicons -->
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
</head>

<body>
  <header class="header">
    <div class="container header__inner">
      <a class="brand" href="index.html">
        <span class="logo" aria-label="Torma Biztonságtechnika logo">
          <img src="assets/logo.png" alt="Torma Biztonságtechnika" />
        </span>
        <span class="brand__text">
          <strong>TORMA Security Technology </strong>
          <span>Kft.</span>
        </span>
      </a>

      <nav class="nav">
        <a data-nav-link href="index.html">Home</a>
        <a data-nav-link href="about.html">About</a>
        <a data-nav-link class="is-active" href="products.html">Products</a>
        <a data-nav-link href="references.html">References</a>
        <a data-nav-link href="contact.html">Contact</a>
        <a data-nav-link href="cart.html" aria-label="Cart">
          <i class="bi bi-basket" aria-hidden="true"></i>
          <span class="badge" data-cart-badge>0</span> 
        </a>
      </nav>

      <div class="actions">
        <a class="btn" href="login.html" aria-label="Log in">
          <ion-icon name="person-circle-outline"></ion-icon>
        </a>

        <button class="btn theme-toggle" type="button" id="themeToggle" aria-label="Toggle theme">
          <ion-icon name="sunny-outline"></ion-icon>
        </button>
        <button class="burger" id="burger" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>

    <div class="drawer" id="drawer">
      <a data-nav-link href="index.html">Home</a>
      <a data-nav-link href="about.html">About</a>
      <a data-nav-link href="products.html">Products</a>
      <a data-nav-link href="references.html">References</a>
      <a data-nav-link href="contact.html">Contact</a>
      <a class="btn" href="login.html">Log in</a>
      <a class="btn btn--primary" href="register.html">Sign up</a>
      <button class="btn" id="drawerClose">Close</button>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="section__head">
        <h2>Products</h2>
      </div>

      <div class="shop">
        <!-- BAL OLDAL -->
        <aside class="shop__sidebar card card--alt p">
          <div id="categoriesDropdown" class="shop__categories">
            <div class="shop__title">Categories</div>

            <div class="catlist" id="catList"></div>
          </div>
          <br>
          <div class="subcats" id="subCatList"></div>
          

          <div class="field">
            <label for="brand">Brand</label>
            <select id="brand">
              <option value="">All</option>
            </select>
          </div>

          <div class="field">
            <label for="priceMax">Max price</label>
            <input id="priceMax" type="number" min="0" step="1000" placeholder="e.g. 50000">
          </div>

          <button class="btn btn--primary" id="clearFilters" type="button">
            Clear filters
          </button>
        </aside>

        <!-- JOBB OLDAL -->
        <section class="shop__main">
          <div class="shopbar card card--alt p">
            <div class="shopbar__left">
              <div id="productsMeta" class="small muted">—</div>
              <div id="addToCartMsg" class="small" style="margin-top:6px; min-height:20px;"></div>
            </div>

            <div class="shopbar__right">
              <div class="field" style="margin:0;">
                <input id="q" type="text" placeholder="Search: Dahua, NVR, PoE...">
              </div>

              <div class="field" style="margin:0; min-width:190px;">
                <select id="sort">
                  <option value="relevance">Sort: Default</option>
                  <option value="priceAsc">Price ascending</option>
                  <option value="priceDesc">Price descending</option>
                  <option value="nameAsc">Name A→Z</option>
                </select>
              </div>
            </div>
          </div>
<br>
          <div id="productsGrid" class="products-grid ds"></div>
        </section>
      </div>
    </div>

    <!-- Product list logic -->
    <script src="js/auth.js"></script>
    <script src="./js/products.js"></script>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <div>
        <div style="font-weight:950;">TORMA Security Technology Ltd.</div>
        <div class="small muted">Asset protection • Low voltage • GPS tracking</div>
      </div>
      <div class="small muted">© 2026</div>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
