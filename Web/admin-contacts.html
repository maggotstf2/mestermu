<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin - Messages</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/auth.js"></script>
  <script>
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user") || "null");

    if (!token || !user || user.role !== "admin") {
      window.location.href = "login.html";
    }
  </script>
  <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
</head>
<body class="admin">

<div class="admin-layout">

  <div class="admin-sidebar-container">
    <aside class="admin-sidebar">
      <h2>Admin</h2>
      <a href="admin.html">Dashboard</a>
      <a href="admin-products.html">Products</a>
      <a href="admin-orders.html">Orders</a>
      <a href="admin-bookings.html">Bookings</a>
      <a href="admin-contacts.html" class="is-active">Messages</a>

      <a href="index.html" class="btn admin-back">
        ← Back to site
      </a>
    </aside>
  </div>

  <main class="admin-main">
    <h1>Contact messages</h1>

    <div class="card p" style="margin-top:20px;">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Message</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Kovács Márk</td>
            <td>mark@email.com</td>
            <td>I am interested in a camera system installation.</td>
          </tr>
          <tr>
            <td>Szabó Dóra</td>
            <td>dora@email.com</td>
            <td>I would like to book an on-site survey appointment.</td>
          </tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

<script src="js/app.js"></script>

</body>
</html>
