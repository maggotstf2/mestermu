<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TORMA Security Technology – Sign Up</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
</head>
<body>
  <div class="topbar">
    <div class="container topbar__inner">
      <span>TORMA Security Technology • Asset protection</span>
      <span>Sign Up</span>
    </div>
  </div>

  <header class="header">
    <div class="container header__inner">
      <a class="brand" href="index.html">
        <span class="logo" aria-label="Torma Biztonságtechnika logo">
          <img src="assets/logo.png" alt="Torma Biztonságtechnika" />
        </span>
        <span class="brand__text">
          <strong>Torma Biztonságtechnika</strong>
          <span>Kft.</span>
        </span>
      </a>

      <nav class="nav">
        <a data-nav-link href="index.html">Home</a>
        <a data-nav-link href="about.html">About</a>
        <a data-nav-link href="products.html">Products</a>
        <a data-nav-link href="references.html">References</a>
        <a data-nav-link href="contact.html">Contact</a>
      </nav>

      <div class="actions">
        <a class="btn" href="login.html" aria-label="Log in">
          <ion-icon name="person-circle-outline"></ion-icon>
        </a>

        <button class="btn theme-toggle" type="button" id="themeToggle" aria-label="Toggle theme">
          <ion-icon name="sunny-outline"></ion-icon>
        </button>

        <button class="burger" id="burger" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>

    <div class="drawer" id="drawer">
      <a data-nav-link href="index.html">Home</a>
      <a data-nav-link href="about.html">About</a>
      <a data-nav-link href="products.html">Products</a>
      <a data-nav-link href="references.html">References</a>
      <a data-nav-link href="contact.html">Contact</a>
      <a class="btn" href="login.html">Log in</a>
      <a class="btn btn--primary" href="register.html">Sign up</a>
      <button class="btn" id="drawerClose">Close</button>
    </div>
  </header>

  <main class="section">
    <div class="container" style="max-width:520px;">
      <div class="card p">
        <h1 style="font-size:34px;margin:0 0 10px;">Sign Up</h1>

        <form class="form" id="registerForm">
          <div class="field">
            <label for="username">Username</label>
            <input id="username" maxlength="32" required />
          </div>
          <div class="row" style="margin-top:12px;">
            <div class="field">
              <label for="firstName">First name</label>
              <input id="firstName" maxlength="50" />
            </div>
            <div class="field">
              <label for="lastName">Last name</label>
              <input id="lastName" maxlength="50" />
            </div>
          </div>
          <div class="field" style="margin-top:12px;">
            <label for="email">E-mail</label>
            <input id="email" type="email" maxlength="100" required />
          </div>
          <div class="field" style="margin-top:12px;">
            <label for="password">Password</label>
            <input id="password" type="password" minlength="6" maxlength="32" required />
          </div>
          <div class="field" style="margin-top:12px;">
            <label for="passwordConfirm">Password again</label>
            <input id="passwordConfirm" type="password" minlength="6" maxlength="32" required />
          </div>

          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;">
            <button class="btn btn--primary" type="submit">Create account</button>
            <a class="btn" href="login.html">Log in</a>
            <a class="btn" href="index.html">Back</a>
          </div>
          <p id="registerMsg" class="small muted" style="margin-top:12px;"></p>
        </form>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <div>
        <div style="font-weight:950;">TORMA Security Technology Ltd.</div>
        <div class="small muted">Security systems • Low voltage • GPS tracking</div>
      </div>
      <div class="small muted">© 2026</div>
    </div>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.querySelector("#registerForm");
      const msg = document.querySelector("#registerMsg");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        msg.textContent = "";

        const username = document.querySelector("#username").value.trim();
        const first_name = document.querySelector("#firstName").value.trim();
        const last_name = document.querySelector("#lastName").value.trim();
        const email = document.querySelector("#email").value.trim();
        const password = document.querySelector("#password").value;
        const passwordConfirm = document.querySelector("#passwordConfirm").value;

        if (password !== passwordConfirm) {
          msg.textContent = "The two passwords do not match.";
          return;
        }

        try {
          const res = await fetch("http://localhost:8000/signup", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              username,
              email,
              password,
              first_name,
              last_name
            })
          });

          const data = await res.json();

          if (!res.ok || !data.success) {
            msg.textContent = data.message || "Registration failed.";
            return;
          }

          msg.textContent = "Registration successful. Redirecting to login...";
          setTimeout(() => {
            window.location.href = "login.html";
          }, 900);
        } catch (err) {
          console.error(err);
          msg.textContent = "Server error.";
        }
      });
    });
  </script>
  <script src="js/app.js"></script>
</body>
</html>
