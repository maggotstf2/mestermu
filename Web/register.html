<!doctype html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TORMA Biztonságtechnika – Regisztráció</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="topbar"><div class="container topbar__inner"><span>TORMA Biztonságtechnika</span><span>Regisztráció</span></div></div>

  <main class="section">
    <div class="container" style="max-width:520px;">
      <div class="card p">
        <h1 style="font-size:34px;margin:0 0 10px;">Regisztráció</h1>
        <p class="lead">Frontend váz (demo). Később backendhez köthető.</p>

        <form class="form" onsubmit="event.preventDefault(); alert('Demo reg ✅');">
          <div class="field">
            <label for="name">Név</label>
            <input id="name" required />
          </div>
          <div class="field" style="margin-top:12px;">
            <label for="email">E-mail</label>
            <input id="email" type="email" required />
          </div>
          <div class="field" style="margin-top:12px;">
            <label for="pw">Jelszó</label>
            <input id="pw" type="password" required />
          </div>

          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;">
            <button class="btn btn--primary" type="submit">Fiók létrehozása</button>
            <a class="btn" href="login.html">Bejelentkezés</a>
            <a class="btn" href="index.html">Vissza</a>
          </div>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
