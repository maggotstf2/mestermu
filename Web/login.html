<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TORMA Security Technology – Login</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
</head>
<body>
  <div class="topbar">
    <div class="container topbar__inner">
      <span>TORMA Security Technology • Asset protection</span>
      <span>Login</span>
    </div>
  </div>

  <header class="header">
    <div class="container header__inner">
      <a class="brand" href="index.html">
        <span class="logo" aria-label="Torma Biztonságtechnika logo">
          <img src="assets/logo.png" alt="Torma Biztonságtechnika" />
        </span>
        <span class="brand__text">
          <strong>TORMA Security Technology</strong>
          <span>Kft.</span>
        </span>
      </a>

      <nav class="nav">
        <a data-nav-link href="index.html">Home</a>
        <a data-nav-link href="about.html">About</a>
        <a data-nav-link href="products.html">Products</a>
        <a data-nav-link href="references.html">References</a>
        <a data-nav-link href="contact.html">Contact</a>
      </nav>

      <div class="actions">
        <a class="btn" href="login.html" aria-label="Log in">
          <ion-icon name="person-circle-outline"></ion-icon>
        </a>

        <button class="btn theme-toggle" type="button" id="themeToggle" aria-label="Toggle theme">
          <ion-icon name="sunny-outline"></ion-icon>
        </button>

        <button class="burger" id="burger" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>

    <div class="drawer" id="drawer">
      <a data-nav-link href="index.html">Home</a>
      <a data-nav-link href="about.html">About</a>
      <a data-nav-link href="products.html">Products</a>
      <a data-nav-link href="references.html">References</a>
      <a data-nav-link href="contact.html">Contact</a>
      <a class="btn" href="login.html">Log in</a>
      <a class="btn btn--primary" href="register.html">Sign up</a>
      <button class="btn" id="drawerClose">Close</button>
    </div>
  </header>

  <main class="section">
    <div class="container" style="max-width:520px;">
      <div class="card p">
        <h1 style="font-size:34px;margin:0 0 10px;">Login</h1>

        <form class="form">
          <div class="field">
            <label for="u">Username / email</label>
            <input id="username" required />
          </div>
          <div class="field" style="margin-top:12px;">
            <label for="p">Password</label>
            <input id="password" type="password" required />
          </div>

          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;">
            <button class="btn btn--primary" type="submit">Sign in</button>
            <a class="btn" href="register.html">Sign up</a>
            <a class="btn" href="index.html">Back</a>
          </div>
        </form>
      </div>
    </div>
  </main>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.querySelector("form");
    
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
    
        const username = document.querySelector("#username").value;
        const password = document.querySelector("#password").value;
        
        try {
          const res = await fetch("http://localhost:8000/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ username, password })
          });
          
          const data = await res.json();
          console.log(username, password);
          
          if (!res.ok) {
            alert(data.message || "Login failed");
            return;
          }
    
          if (window.Auth?.setSession) {
            window.Auth.setSession(data.token, data.user);
          } else {
            localStorage.setItem("token", data.token);
            localStorage.setItem("user", JSON.stringify(data.user));
          }
    
          if (data.user.role === "admin") {
            window.location.href = "admin.html";
          } else {
            const redirect = new URLSearchParams(window.location.search).get("redirect");
            if (redirect && /^[a-zA-Z0-9._-]+\.html(?:\?.*)?$/.test(redirect)) {
              window.location.href = redirect;
            } else {
              window.location.href = "dashboard.html";
            }
          }
    
        } catch (err) {
          console.error(err);
          alert("Server error");
        }
      });
    });
    </script>

  <footer class="footer">
    <div class="container footer__inner">
      <div>
        <div style="font-weight:950;">TORMA Security Technology Ltd.</div>
        <div class="small muted">Asset protection • Low voltage • GPS tracking</div>
      </div>
      <div class="small muted">© 2026</div>
    </div>
  </footer>
  <script>
  </script>
  <script src="js/app.js"></script>
  
</body>
</html>
